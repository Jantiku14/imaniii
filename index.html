<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;overflow-x:hidden}

/* Animated background */
.bg-main{
  background:linear-gradient(-45deg,#FFF8F0,#FFE4E6,#E8D5F5,#DBEAFE,#FFF0F5,#F0F0FF);
  background-size:500% 500%;
  animation:gradShift 20s ease infinite;
  min-height:100vh;
}
@keyframes gradShift{
  0%{background-position:0% 50%}
  25%{background-position:50% 0%}
  50%{background-position:100% 50%}
  75%{background-position:50% 100%}
  100%{background-position:0% 50%}
}

/* Glassmorphism */

  background:rgba(255,255,255,0.35);

  border-radius:1.5rem;

}
.glass-strong{
  background:rgba(255,255,255,0.55);

}

  display:flex;align-items:center;gap:0.75rem;

}
.opt-btn:hover:not(.locked){background:rgba(255,255,255,0.65);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,0.07)}
.opt-btn:active:not(.locked){transform:translateY(0)}
.opt-btn .letter{

// ============================
// MUSIC SYSTEM (Web Audio API ambient pad)
// ============================
function initMusic() {
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    musicGain = audioCtx.createGain();
    musicGain.gain.value = 0;
    musicGain.connect(audioCtx.destination);

    const notes = [
      { freq: 130.81, vol: 0.12 },
      { freq: 164.81, vol: 0.09 },
      { freq: 196.00, vol: 0.07 },
      { freq: 246.94, vol: 0.05 },
      { freq: 261.63, vol: 0.04 },
      { freq: 329.63, vol: 0.03 }
    ];

    notes.forEach(n => {
      const osc = audioCtx.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = n.freq;

      const g = audioCtx.createGain();
      g.gain.value = n.vol;

      const lfo = audioCtx.createOscillator();
      lfo.frequency.value = 0.2 + Math.random() * 0.3;
      const lfoG = audioCtx.createGain();
      lfoG.gain.value = 1.2;
      lfo.connect(lfoG);
      lfoG.connect(osc.frequency);
      lfo.start();

      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 500;
      filter.Q.value = 0.3;

      osc.connect(filter);
      filter.connect(g);
      g.connect(musicGain);
      osc.start();
    });
  } catch(e) { console.log('Audio not supported'); }
}

function toggleMusic() {
  if (!audioCtx) initMusic();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  isMuted = !isMuted;
  musicGain.gain.linearRampToValueAtTime(isMuted ? 0 : 0.06, audioCtx.currentTime + 0.5);
  musicIcon.setAttribute('icon', isMuted ? 'lucide:volume-x' : 'lucide:volume-2');
  musicIcon.style.color = isMuted ? '#6B7280' : '#EC4899';
}

  }
  resize() {
    this.canvas.width = window.innerWidth;
    this.canvas.height = window.innerHeight;
  }
  launch(count = 120, spread = true) {
    const colors = ['#F472B6','#A78BFA','#60A5FA','#FBBF24','#34D399','#FB7185','#C084FC','#F9A8D4','#93C5FD'];
    const cx = this.canvas.width / 2;
    for (let i = 0; i < count; i++) {
      this.particles.push({
        x: spread ? cx + (Math.random()-0.5)*this.canvas.width*0.8 : Math.random()*this.canvas.width,
        y: spread ? -20 - Math.random()*60 : -10 - Math.random()*200,
        w: 5 + Math.random()*7,
        h: 3 + Math.random()*9,
        color: colors[Math.floor(Math.random()*colors.length)],
        vx: (Math.random()-0.5)*(spread?6:3),
        vy: 1.5 + Math.random()*4,
        rot: Math.random()*360,
        rotS: (Math.random()-0.5)*12,
        opacity: 1,
        shape: Math.random()>0.4?'rect':'circle',
        gravity: 0.04 + Math.random()*0.03,
        drag: 0.98 + Math.random()*0.015
      });
    }
    if (!this.running) { this.running = true; this.animate(); }
  }
  animate() {
    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
    this.particles = this.particles.filter(p => {
      p.vx *= p.drag;
      p.vy += p.gravity;
      p.x += p.vx;
      p.y += p.vy;
      p.rot += p.rotS;
      if (p.y > this.canvas.height * 0.7) p.opacity -= 0.015;
      if (p.opacity <= 0) return false;
      this.ctx.save();
      this.ctx.translate(p.x, p.y);
      this.ctx.rotate(p.rot * Math.PI/180);
      this.ctx.globalAlpha = Math.max(0, p.opacity);
      this.ctx.fillStyle = p.color;
      if (p.shape==='rect') {
        this.ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      } else {
        this.ctx.beginPath();
        this.ctx.arc(0,0,p.w/2,0,Math.PI*2);
        this.ctx.fill();
      }
      this.ctx.restore();
      return true;
    });
    if (this.particles.length > 0) requestAnimationFrame(()=>this.animate());
    else this.running = false;
  }
}
const confetti = new ConfettiSystem(confettiCanvas);


// ============================
// PARTICLES
// ============================
function createParticles() {
  const colors = ['rgba(244,114,182,0.3)','rgba(167,139,250,0.3)','rgba(96,165,250,0.25)','rgba(251,191,36,0.2)','rgba(249,168,212,0.25)'];
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 4 + Math.random()*10;
    p.style.cssText = `
      width:${size}px;height:${size}px;
      left:${Math.random()*100}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${12+Math.random()*18}s;
      animation-delay:${Math.random()*15}s;
    `;
    particlesContainer.appendChild(p);
  }
}
createParticles();


// ============================
// TYPEWRITER
// ============================
function typewriter(el, text, speed = 25) {
  return new Promise(resolve => {
    el.textContent = '';
    el.classList.add('typewriter-cursor');
    let i = 0;
    function tick() {
      if (i < text.length) {
        el.textContent += text.charAt(i);
        i++;
        setTimeout(tick, speed);
      } else {
        el.classList.remove('typewriter-cursor');
        resolve();
      }
    }
    tick();
  });
}


// ============================
// QUIZ RENDERING
// ============================
const letters = ['A','B','C','D'];

function renderQuestion() {
  const q = quizData[currentQ];
  const progress = ((currentQ) / quizData.length) * 100;
  selectedOptions = new Set();
  isRevealed = false;

  let optionsHTML = q.options.map((opt, i) => `
    <button class="opt-btn w-full" data-index="${i}">
      <span class="letter">${letters[i]}</span>
      <span>${opt}</span>
    </button>
  `).join('');

  let revealBtnHTML = q.multiSelect ? `<div class="text-center mt-5 hidden" id="multi-reveal-wrap"><button class="reveal-btn" id="multi-reveal-btn">See Answer</button></div>` : '';

  quizContent.innerHTML = `
    <div class="flex items-center justify-between mb-2">
      <span class="text-xs font-medium text-gray-400 tracking-wide">Question ${currentQ+1} of ${quizData.length}</span>
      <span class="text-xs text-gray-300">${Math.round(progress)}%</span>
    </div>
    <div class="prog-track mb-6"><div class="prog-fill" style="width:${progress}%"></div></div>
    <h2 class="text-lg sm:text-xl font-semibold text-gray-800 mb-6 leading-snug">${q.question}</h2>
    <div class="flex flex-col gap-3" id="options-container">${optionsHTML}</div>
    ${revealBtnHTML}
    <div class="mt-6 hidden" id="reveal-area"></div>
    <div class="mt-6 hidden text-center" id="continue-area"><button class="cont-btn" id="continue-btn">Continue</button></div>
  `;

  // Attach events
  const optBtns = quizContent.querySelectorAll('.opt-btn');
  optBtns.forEach(btn => {
    btn.addEventListener('click', () => handleOptionClick(btn, parseInt(btn.dataset.index)));
  });

  if (q.multiSelect) {
    const multiRevealBtn = document.getElementById('multi-reveal-btn');
    const multiRevealWrap = document.getElementById('multi-reveal-wrap');
    optBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        if (isRevealed) return;
        multiRevealWrap.classList.remove('hidden');
      });
    });
    if (multiRevealBtn) {
      multiRevealBtn.addEventListener('click', () => {
        if (selectedOptions.size === 0 || isRevealed) return;
        revealMultiAnswer();
      });
    }
  }

  const continueBtn = document.getElementById('continue-btn');
  if (continueBtn) continueBtn.addEventListener('click', goToNext);
}

function handleOptionClick(btn, index) {
  if (isRevealed) return;
  const q = quizData[currentQ];

  if (q.multiSelect) {
    if (selectedOptions.has(index)) {
      selectedOptions.delete(index);
      btn.classList.remove('selected');
    } else {
      selectedOptions.add(index);
      btn.classList.add('selected');
    }
  } else {
    selectedOptions.add(index);
    // Highlight selected
    quizContent.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    // Reveal immediately
    setTimeout(() => revealSingleAnswer(index), 400);
  }
}

function revealSingleAnswer(selectedIndex) {
  isRevealed = true;
  const q = quizData[currentQ];
  const btns = quizContent.querySelectorAll('.opt-btn');
  const isCorrect = q.correct.includes(selectedIndex);

  btns.forEach((btn, i) => {
    btn.classList.add('locked');
    if (q.correct.includes(i)) btn.classList.add('correct');
    else if (i === selectedIndex && !isCorrect) btn.classList.add('wrong');
  });

  showRevealAndContinue(q.reveal);
}

function revealMultiAnswer() {
  isRevealed = true;
  const q = quizData[currentQ];
  const btns = quizContent.querySelectorAll('.opt-btn');

  btns.forEach((btn, i) => {
    btn.classList.add('locked');
    btn.classList.remove('selected');
    if (q.correct.includes(i)) {
      btn.classList.add('correct');
    } else if (selectedOptions.has(i)) {
      btn.classList.add('wrong');
    }
  });

  // Hide reveal button
  const wrap = document.getElementById('multi-reveal-wrap');
  if (wrap) wrap.classList.add('hidden');

  showRevealAndContinue(q.reveal);
}

function showRevealAndContinue(revealText) {
  const revealArea = document.getElementById('reveal-area');
  const continueArea = document.getElementById('continue-area');

  if (revealText) {
    revealArea.classList.remove('hidden');
    const p = document.createElement('p');
    p.className = 'text-gray-500 text-sm sm:text-base leading-relaxed';
    p.style.minHeight = '2em';
    revealArea.appendChild(p);
    typewriter(p, revealText, 18).then(() => {
      continueArea.classList.remove('hidden');
      continueArea.style.animation = 'fadeInUp 0.5s ease-out forwards';
    });
  } else {
    continueArea.classList.remove('hidden');
    continueArea.style.animation = 'fadeInUp 0.5s ease-out forwards';
  }
}

function goToNext() {
  quizCard.classList.remove('anim-card-enter');
  quizCard.classList.add('anim-card-exit');

  setTimeout(() => {
    currentQ++;
    if (currentQ < quizData.length) {
      quizCard.classList.remove('anim-card-exit');
      quizCard.classList.add('anim-card-enter');
      renderQuestion();
    } else {
      showBonusPage();
    }
  }, 380);
}


// ============================
// BONUS PAGE
// ============================
function showBonusPage() {
  quizCard.classList.remove('anim-card-exit');
  quizCard.classList.add('anim-card-enter');

  let linesHTML = bonusContent.lines.map((line, i) => {
    const delay = 0.15 * (i + 1);
    const isLast = i === bonusContent.lines.length - 1;
    return `<p class="anim-fade-up text-gray-600 text-sm sm:text-base leading-relaxed ${isLast ? 'font-semibold text-gray-800 text-lg mt-2' : ''}" style="animation-delay:${delay}s">${line}</p>`;
  }).join('');

  quizContent.innerHTML = `
    <div class="text-center mb-6">
      <h2 class="text-xl font-bold text-gray-800">${bonusContent.title}</h2>
    </div>
    <div class="flex flex-col gap-3 sm:gap-4 mb-8">${linesHTML}</div>
    <div class="text-center"><button class="cont-btn" id="bonus-continue-btn">Continue</button></div>
  `;

  document.getElementById('bonus-continue-btn').addEventListener('click', () => {
    quizCard.classList.add('anim-card-exit');
    setTimeout(() => {
      showFinalQuestion();
    }, 380);
  });
}


// ============================
// FINAL QUESTION
// ============================
function showFinalQuestion() {
  quizCard.classList.remove('anim-card-exit');
  quizCard.classList.add('anim-card-enter');

  let optionsHTML = finalQuestion.options.map((opt, i) => `
    <button class="opt-btn w-full" data-index="${i}">
      <span class="letter">${letters[i]}</span>
      <span>${opt}</span>
    </button>
  `).join('');

  quizContent.innerHTML = `
    <div class="text-center mb-6">
      <span class="text-xs font-medium text-purple-400 tracking-widest uppercase">Final Question</span>
    </div>
    <h2 class="text-lg sm:text-xl font-semibold text-gray-800 mb-6 leading-snug text-center">${finalQuestion.question}</h2>
    <div class="flex flex-col gap-3" id="final-options">${optionsHTML}</div>
  `;

  const btns = quizContent.querySelectorAll('.opt-btn');
  btns.forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.classList.contains('locked')) return;
      btns.forEach(b => b.classList.add('locked'));
      btn.classList.add('selected');
      // Brief highlight, then cinematic fade
      setTimeout(() => cinematicFade(), 1200);
    });
  });
}


// ============================
// CINEMATIC FADE
// ============================
function cinematicFade() {
  whiteOverlay.classList.add('active');
  setTimeout(() => {
    quizSection.classList.add('hidden');
    showLetter();
    setTimeout(() => {
      whiteOverlay.classList.remove('active');
    }, 400);
  }, 1400);
}


// ============================
// LETTER
// ============================
function showLetter() {
  letterSection.classList.remove('hidden');

  let html = '<div class="flex flex-col gap-6">';
  letterParagraphs.forEach((p, i) => {
    const cls = p.class || 'text-gray-600';
    const style = p.style || '';
    const delayClass = `letter-p`;
    html += `<p class="${cls} ${delayClass}" ${style ? `style="${style}"` : ''} data-delay="${i * 80}">${p.text}</p>`;
  });
  html += '</div>';
  letterContent.innerHTML = html;

  // Scroll to top
  window.scrollTo({ top: 0, behavior: 'instant' });

  // Observe for scroll reveal
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        setTimeout(() => entry.target.classList.add('visible'), parseInt(entry.target.dataset.delay) || 0);
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.15, rootMargin: '0px 0px -40px 0px' });

  document.querySelectorAll('.letter-p').forEach(p => observer.observe(p));

  celebrateBtn.addEventListener('click', triggerEnding);
}


// ============================
// ENDING
// ============================
function triggerEnding() {
  // Big confetti burst
  confetti.launch(250, true);
  setTimeout(() => confetti.launch(150, true), 600);
  setTimeout(() => confetti.launch(100, true), 1200);

  // Start floating hearts
  startHearts();

  // Show ending overlay
  endingOverlay.classList.remove('hidden');
  endingOverlay.style.animation = 'fadeIn 1s ease-out forwards';

  endingContent.innerHTML = `
    <div style="animation:bounceIn 0.8s ease-out forwards">
      <p class="text-6xl sm:text-7xl mb-6">❤️</p>
      <h2 class="font-serif text-3xl sm:text-4xl md:text-5xl font-bold leading-tight mb-4" style="background:linear-gradient(135deg,#EC4899,#A855F7,#6366F1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">
        Happy 19th Birthday,<br>Faith
      </h2>
      <p class="text-gray-400 text-sm mt-6 mb-10 font-light">You deserve every good thing.</p>
      <button id="replay-btn" class="text-sm text-gray-400 hover:text-pink-400 transition-colors duration-300 underline underline-offset-4 decoration-gray-300 hover:decoration-pink-300">
        Play Again
      </button>
    </div>
  `;

  document.getElementById('replay-btn').addEventListener('click', () => location.reload());

  // Add zoom to background
  document.querySelector('.bg-main').classList.add('bg-zoom');
}

function startHearts() {
  const hearts = ['❤️','💕','💗','💖','🤍','🩷'];
  if (heartsInterval) clearInterval(heartsInterval);
  heartsInterval = setInterval(() => {
    const h = document.createElement('div');
    h.className = 'float-heart';
    h.textContent = hearts[Math.floor(Math.random()*hearts.length)];
    h.style.cssText = `
      left:${5+Math.random()*90}%;
      bottom:-20px;
      font-size:${1+Math.random()*1.5}rem;
      animation-duration:${4+Math.random()*3}s;
    `;
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 7500);
  }, 350);

  // Stop after 15 seconds
  setTimeout(() => {
    if (heartsInterval) { clearInterval(heartsInterval); heartsInterval = null; }
  }, 15000);
}


// ============================
// PAGE TRANSITIONS
// ============================
function showQuiz() {
  landing.style.animation = 'fadeOut 0.6s ease-out forwards';
  setTimeout(() => {
    landing.classList.add('hidden');
    quizSection.classList.remove('hidden');
    renderQuestion();
  }, 600);
}


// ============================
// INIT
// ============================
document.getElementById('start-btn').addEventListener('click', () => {
  // Init music on first interaction
  if (!audioCtx) initMusic();
  showQuiz();
});

// Landing confetti
setTimeout(() => confetti.launch(80, true), 800);
setTimeout(() => confetti.launch(40, true), 1600);
</script>
